<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK BRAND - Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">RHK</div>

    <h2>RHK BRAND</h2>

    <input
        type="text"
        id="username"
        placeholder="Username"
        autocomplete="username"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
        autocomplete="current-password"
    >

    <button id="loginBtn">
        Login
    </button>

    <div class="loading" id="loading"></div>

    <p id="message"></p>

    <div class="link">
        Don't have an account?
        <br><br>

        <a href="create-newaccount.html">
            Create New Account
        </a>
    </div>

</div>

<!-- Login Script -->
<script type="module" src="login.js"></script>

</body>
</html>
