<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Him Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container" style="text-align: center;">
        <div class="login-header">
            <h2>Welcome, <span id="displayUsername">User</span>!</h2>
            <p>You have successfully logged in.</p>
        </div>

        <div style="margin: 20px 0;">
            <img id="displayProfilePic" src="" alt="Profile Picture" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #0066cc; display: none; margin: 0 auto;">
        </div>

        <button type="button" id="logoutBtn" class="btn secondary-btn" style="background-color: #ff4d4d; color: white;">Log Out</button>
    </div>

    <script>
        // Check local storage for logged-in user session
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));

        if (!currentUser) {
            // Redirect back to login if no active session
            window.location.href = "login.html";
        } else {
            document.getElementById('displayUsername').textContent = currentUser.username;
            if (currentUser.profilePic) {
                const picEl = document.getElementById('displayProfilePic');
                picEl.src = currentUser.profilePic;
                picEl.style.display = "block";
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
