<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Create Account</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="logo">RHK</div>

<h2>Create Account</h2>

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="file"
id="photo"
accept="image/*">

<button id="signupBtn">
Create Account
</button>

<p>

Already have an account?

<a href="index.html">

Login

</a>

</p>

<div id="message"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
