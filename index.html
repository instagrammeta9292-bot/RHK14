<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK Portal</title>
    <!-- Link to the new stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Auth Card (Matches image_0.png design) -->
        <div class="auth-box" id="authBox">
            <div class="rhk-logo">RHK</div>
            <h3 id="formTitle" class="subtitle">SIGN IN TO RHK</h3>

            <form id="authForm">
                
                <!-- Username Field with Icon -->
                <div class="input-group">
                    <label for="usernameInput">Username</label>
                    <div class="input-wrapper icon-left">
                        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c9a96e'><path d='M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7z'/></svg>" alt="User Icon" class="field-icon">
                        <input type="text" id="usernameInput" placeholder="username" required autocomplete="username">
                        <span class="domain-suffix">@gmail.com</span>
                    </div>
                </div>

                <!-- Password Field with Icon and Toggle -->
                <div class="input-group">
                    <label for="passwordInput">Password</label>
                    <div class="input-wrapper icon-left icon-right">
                        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c9a96e'><path d='M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3 3-3s3 1.29 3 3v2z'/></svg>" alt="Lock Icon" class="field-icon left-icon">
                        <input type="password" id="passwordInput" placeholder="password" required autocomplete="current-password">
                        <span id="togglePassword" class="toggle-password right-icon">
                            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c9a96e'><path d='M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z'/></svg>" alt="Show Password">
                        </span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="primary-btn">SIGN IN</button>
            </form>

            <div class="or-divider">
                <span>OR</span>
            </div>

            <button id="toggleLink" class="secondary-btn outline-btn">CREATE A NEW ACCOUNT</button>
            
            <div id="errorMessage" class="error-msg"></div>
        </div>

        <!-- Dashboard / Welcome Screen (Hidden by default) -->
        <div class="dashboard-box hidden" id="dashboardBox">
            <h2 style="color: #c9a96e;">Welcome, <span id="userDisplayEmail"></span></h2>
            <p class="subtitle">You are logged in to the RHK portal.</p>
            <button id="logoutBtn" class="secondary-btn">Log Out</button>
        </div>
    </div>

    <!-- Firebase SDKs (Modular v10+) -->
    <script type="module" src="script.js"></script>
</body>
</html>
