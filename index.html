<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK - Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Auth Card -->
        <div class="auth-box" id="authBox">
            <h2 id="formTitle">RHK Login</h2>
            <p id="formSubtitle" class="subtitle">Enter your credentials to continue</p>

            <form id="authForm">
                <div class="input-group">
                    <label for="usernameInput">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="usernameInput" placeholder="username" required autocomplete="username">
                        <span class="domain-suffix">@gmail.com</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="passwordInput">Password</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="submitBtn" class="primary-btn">Log In</button>
            </form>

            <p class="switch-text">
                <span id="toggleText">Don't have an account?</span> 
                <a href="#" id="toggleLink">Create one</a>
            </p>
            <div id="errorMessage" class="error-msg"></div>
        </div>

        <!-- Dashboard / Welcome Screen (Hidden by default) -->
        <div class="dashboard-box hidden" id="dashboardBox">
            <h2>Welcome to RHK, <span id="userDisplayEmail"></span>!</h2>
            <p class="subtitle">You are successfully logged in.</p>
            <button id="logoutBtn" class="secondary-btn">Log Out</button>
        </div>
    </div>

    <!-- Firebase SDKs (Modular v10+) -->
    <script type="module" src="script.js"></script>
</body>
</html>
