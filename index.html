<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK Brand App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. SPLASH SCREEN -->
    <div id="splash-screen" class="screen">
        <div class="splash-content">
            <h1>RHK</h1>
            <p>Welcome to the RHK Experience</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- 2. LOGIN SCREEN -->
    <div id="login-screen" class="screen hidden">
        <div class="auth-card">
            <h2>RHK Login</h2>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="switch-text">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
        </div>
    </div>

    <!-- 3. SIGNUP SCREEN -->
    <div id="signup-screen" class="screen hidden">
        <div class="auth-card">
            <h2>Create RHK Account</h2>
            <form id="signup-form">
                <div class="file-upload-wrapper">
                    <label for="signup-avatar" class="file-label">Choose Profile Photo</label>
                    <input type="file" id="signup-avatar" accept="image/*" required>
                </div>
                <img id="avatar-preview" class="hidden" alt="Preview">
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="email" id="signup-email" placeholder="Email (for security recovery)" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <p class="switch-text">Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>
    </div>

    <!-- 4. DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="screen hidden">
        <nav class="navbar">
            <h2>RHK Dashboard</h2>
            <button id="logout-btn" class="btn-danger">Logout</button>
        </nav>
        <div class="dashboard-content">
            <img id="dash-avatar" src="" alt="Profile Photo">
            <h3 id="dash-username"></h3>
            <p>Welcome back! You are securely logged into your RHK account.</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
