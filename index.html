<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>RHK</h1>
        <p>Brand Login</p>
    </div>

    <form id="loginForm">

        <div class="input-box">
            <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <button type="button" id="createAccount" class="create-btn">
            Create New Account
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
