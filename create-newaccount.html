<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - RHK BRAND</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">RHK</div>

    <h2>Create New Account</h2>

    <!-- Profile Photo Preview -->
    <img
        id="preview"
        class="profile-preview"
        src="https://via.placeholder.com/120?text=Photo"
        alt="Profile Photo">

    <!-- Select Photo -->
    <input
        type="file"
        id="photo"
        accept="image/*">

    <!-- Username -->
    <input
        type="text"
        id="username"
        placeholder="Choose Username">

    <!-- Password -->
    <input
        type="password"
        id="password"
        placeholder="Choose Password">

    <!-- Create Button -->
    <button id="createBtn">
        Create Account
    </button>

    <!-- Loading -->
    <div class="loading" id="loading"></div>

    <!-- Message -->
    <p id="message"></p>

    <div class="link">
        Already have an account?
        <br><br>

        <a href="login.html">
            Login Here
        </a>
    </div>

</div>

<script type="module" src="signup.js"></script>

<script>
const photo = document.getElementById("photo");
const preview = document.getElementById("preview");

photo.onchange = function(){

    const file = this.files[0];

    if(file){

        preview.src = URL.createObjectURL(file);

    }

}
</script>

</body>
</html>
