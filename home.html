<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK BRAND - Home</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .home-box{
            width:360px;
            background:#fff;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .home-photo{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #000;
            margin-bottom:15px;
        }

        .home-box h1{
            margin-bottom:8px;
            color:#111;
        }

        .home-box p{
            color:#666;
            margin-bottom:20px;
        }

        #logoutBtn{
            background:#e53935;
        }

        #logoutBtn:hover{
            background:#c62828;
        }
    </style>
</head>
<body>

<div class="home-box">

    <img
        id="profilePhoto"
        class="home-photo"
        src=""
        alt="Profile">

    <h1 id="username">Username</h1>

    <p>Welcome to RHK BRAND</p>

    <button id="logoutBtn">
        Logout
    </button>

</div>

<script type="module" src="home.js"></script>

</body>
</html>
